<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:30px;font-weight:700;fill:#1f2937}
      .box{fill:#eef6ff;stroke:#2563eb;stroke-width:2;rx:16;ry:16}
      .box2{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:16;ry:16}
      .box3{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:16;ry:16}
      .text{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#111827;text-anchor:middle}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#374151;text-anchor:middle}
      .arrow{stroke:#374151;stroke-width:3;fill:none;marker-end:url(#arrowhead)}
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#374151"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600" y="48" class="title" text-anchor="middle">RNA-seq to Control-corrected C-to-U Editing Labels</text>

  <rect x="70" y="100" width="210" height="80" class="box"/>
  <text x="175" y="132" class="text">SRA files</text>
  <text x="175" y="158" class="small">treated + mock/control</text>

  <rect x="370" y="100" width="210" height="80" class="box"/>
  <text x="475" y="132" class="text">FASTQ extraction</text>
  <text x="475" y="158" class="small">prefetch / fasterq-dump</text>

  <rect x="670" y="100" width="210" height="80" class="box"/>
  <text x="775" y="132" class="text">STAR alignment</text>
  <text x="775" y="158" class="small">GRCh38 reference</text>

  <rect x="970" y="100" width="170" height="80" class="box"/>
  <text x="1055" y="132" class="text">Sorted BAM</text>
  <text x="1055" y="158" class="small">indexed BAM files</text>

  <path d="M280 140 L370 140" class="arrow"/>
  <path d="M580 140 L670 140" class="arrow"/>
  <path d="M880 140 L970 140" class="arrow"/>

  <rect x="155" y="270" width="270" height="95" class="box2"/>
  <text x="290" y="306" class="text">Scan exon C sites</text>
  <text x="290" y="332" class="small">GENCODE transcript-oriented</text>
  <text x="290" y="352" class="small">C-equivalent genomic positions</text>

  <rect x="465" y="270" width="270" height="95" class="box2"/>
  <text x="600" y="306" class="text">Count edited reads</text>
  <text x="600" y="332" class="small">+ strand: C→T</text>
  <text x="600" y="352" class="small">- strand: G→A</text>

  <rect x="775" y="270" width="270" height="95" class="box2"/>
  <text x="910" y="306" class="text">All-C site table</text>
  <text x="910" y="332" class="small">edited_count / total_count</text>
  <text x="910" y="352" class="small">edit_rate, coverage ≥ 20</text>

  <path d="M1055 180 C1055 230 290 220 290 270" class="arrow"/>
  <path d="M425 317 L465 317" class="arrow"/>
  <path d="M735 317 L775 317" class="arrow"/>

  <rect x="160" y="465" width="270" height="95" class="box3"/>
  <text x="295" y="500" class="text">Merge replicates</text>
  <text x="295" y="526" class="small">sum edited_count</text>
  <text x="295" y="546" class="small">sum total_count</text>

  <rect x="465" y="465" width="270" height="95" class="box3"/>
  <text x="600" y="500" class="text">Treated-control correction</text>
  <text x="600" y="526" class="small">delta = treated - control</text>
  <text x="600" y="546" class="small">corrected rate</text>

  <rect x="770" y="465" width="280" height="95" class="box3"/>
  <text x="910" y="500" class="text">Candidate editing sites</text>
  <text x="910" y="526" class="small">treated high, control low</text>
  <text x="910" y="546" class="small">AI-ready positive labels</text>

  <path d="M910 365 C910 420 295 420 295 465" class="arrow"/>
  <path d="M430 512 L465 512" class="arrow"/>
  <path d="M735 512 L770 512" class="arrow"/>

  <rect x="315" y="640" width="570" height="70" fill="#f9fafb" stroke="#6b7280" stroke-width="2" rx="16" ry="16"/>
  <text x="600" y="670" class="text">LAMAR training dataset</text>
  <text x="600" y="695" class="small">positive: high-confidence candidates; negative: clean background C sites</text>
  <path d="M910 560 C910 615 600 600 600 640" class="arrow"/>
</svg>
